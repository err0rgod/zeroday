{% extends "base.html" %}

{% block title %}Admin Login | zerodaily.in{% endblock %}

{% block head_extra %}
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Secure admin login for the ZeroDaily dashboard. Page is intentionally excluded from search indexing.">
{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex flex-col justify-center items-center px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md bg-dark-800 border border-slate-700 rounded-xl p-8 smooth-shadow overflow-hidden relative">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-500 to-purple-500"></div>
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-white tracking-tight">Admin <span class="text-brand-400">Login</span></h2>
            <p class="text-slate-400 text-sm mt-2">Sign in to access the ZeroDaily Dashboard.</p>
        </div>

        {% if error_msg %}
        <div class="bg-red-500/10 border border-red-500/20 rounded-md p-3 mb-6 text-center">
            <p class="text-red-400 text-sm font-medium">{{ error_msg }}</p>
        </div>
        {% endif %}

        <form action="/login" method="POST" class="space-y-6">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5">Username</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" required 
                        class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg bg-dark-900 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all sm:text-sm" placeholder="admin">
                </div>
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-slate-300 mb-1.5 flex justify-between">
                    Password
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500">
                        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input type="password" id="password" name="password" required 
                        class="block w-full pl-10 pr-3 py-2 border border-slate-700 rounded-lg bg-dark-900 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all sm:text-sm" placeholder="••••••••">
                </div>
            </div>

            <button type="submit" 
                class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-brand-500 hover:bg-brand-400 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-500 focus:ring-offset-dark-900 transition-colors">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}
