version: '3.8'

services:
  web:
    build:
      context: ./web
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      # Optional: mount local code for hot reloading during dev
      - ./web:/app
    # The application code handles fetching data from Azure Blob Storage


