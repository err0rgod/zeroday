version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      # Optional: mount local code for hot reloading during dev
      - .:/app
    # The application code handles fetching data from Azure Blob Storage


